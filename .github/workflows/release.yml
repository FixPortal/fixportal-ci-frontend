name: Release

# Publish @fix-portal/ci-frontend to public npm on a version tag (e.g. v0.1.0).
#
# The package scope (@fix-portal) is distinct from @fixportal/design's scope, so
# consumers map just this scope to public npm and install it tokenlessly — no
# GitHub Packages mirror needed.
#
# Prerequisites (one-time):
#   1. The npm org "fix-portal" exists (it does). The package sets
#      publishConfig.access=public.
#   2. Add an automation npm token as the repo secret NPM_TOKEN
#      (npm -> Access Tokens -> Generate -> Automation), generated from an
#      account that is a member of the fix-portal org.
# Then: `git tag v0.1.0 && git push origin v0.1.0`.

on:
  push:
    tags: ['v*']

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          registry-url: https://registry.npmjs.org

      - name: Install
        run: npm ci

      - name: Build library
        run: npm run build:lib

      - name: Publish to public npm
        run: npm publish -w @fix-portal/ci-frontend
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
