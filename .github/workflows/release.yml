name: Release

# Publish @fix-portal/ci-frontend to public npm on a version tag (e.g. v0.1.0).
#
# The package scope (@fix-portal) is distinct from @fixportal/design's scope, so
# consumers map just this scope to public npm and install it tokenlessly — no
# GitHub Packages mirror needed.
#
# Prerequisites (one-time):
#   1. The npm org "fix-portal" exists (it does). The package sets
#      publishConfig.access=public.
#   2. Add a granular npm token (Read and write on fix-portal org scope) as
#      the repo secret NPM_TOKEN. Set via GitHub web UI — never on the command line.
#      Org 2FA enforcement (npmjs.com → fix-portal org → Settings → Security)
#      must not be "Required" or token publish will EOTP regardless of account mode.
# Then: `git tag v0.x.x && git push origin v0.x.x`.

on:
  push:
    tags: ['v*']

jobs:
  publish:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          registry-url: https://registry.npmjs.org

      - name: Install
        run: npm ci

      - name: Build library
        run: npm run build:lib

      - name: Publish to public npm
        run: npm publish -w @fix-portal/ci-frontend
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
